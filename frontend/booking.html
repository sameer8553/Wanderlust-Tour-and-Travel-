<!DOCTYPE html>
<html>
<head>
    <title>Booking Page</title>
    <link rel="stylesheet" href="booking.css">
</head>
<body>

<h2 class="heading">Package Booking</h2>

<div class="form-container">
    <form id="bookingForm">

        <label>Package Name</label>
        <input type="text" id="pkgName" readonly>

        <label>Price</label>
        <input type="text" id="pkgPrice" readonly>

        <label>Full Name</label>
        <input type="text" id="fullName" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <button type="submit">Confirm Booking</button>

    </form>
</div>

<script>
// URL se package details lena
const params = new URLSearchParams(window.location.search);
document.getElementById("pkgName").value = params.get("package");
document.getElementById("pkgPrice").value = params.get("price");

document.getElementById("bookingForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const bookingData = {
        fullName: document.getElementById("fullName").value,
        email: document.getElementById("email").value,
        packageName: document.getElementById("pkgName").value,
        packagePrice: document.getElementById("pkgPrice").value,
        packageId: params.get("id") || 'unknown'
    };

    try {
        const response = await fetch("https://wanderlust-backend-uq67.onrender.com/api/create-booking", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(bookingData)
        });

        const result = await response.json();

        if (response.ok) {
            alert("Booking Successful! We will contact you soon.");
            document.getElementById("fullName").value = "";
            document.getElementById("email").value = "";
        } else {
            alert("Error: " + result.message);
        }
    } catch (error) {
        alert("Server error. Please try again.");
        console.error("Booking error:", error);
    }
});
</script>

</body>
</html>
